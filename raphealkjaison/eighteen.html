<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Person List Display</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at top left, #0f172a 0%, #1e293b 45%, #020617 100%);
            color: #e2e8f0;
            font-family: 'Inter', system-ui, sans-serif;
        }

        .card {
            width: min(680px, calc(100% - 32px));
            padding: 36px 32px;
            border-radius: 28px;
            background: rgba(15, 23, 42, 0.96);
            border: 1px solid rgba(148, 163, 184, 0.18);
            box-shadow: 0 30px 70px rgba(15, 23, 42, 0.45);
            backdrop-filter: blur(16px);
        }

        h1 {
            margin: 0 0 12px;
            font-size: clamp(2rem, 3vw, 2.4rem);
        }

        p {
            margin: 0 0 24px;
            color: #cbd5e1;
            line-height: 1.7;
        }

        .person-list {
            margin-top: 24px;
            display: grid;
            gap: 14px;
        }

        .person-card {
            padding: 18px 20px;
            border-radius: 18px;
            background: rgba(148, 163, 184, 0.08);
            border: 1px solid rgba(148, 163, 184, 0.18);
            color: #f8fafc;
        }

        .person-card strong {
            color: #7dd3fc;
        }

        button {
            margin-top: 24px;
            width: 100%;
            padding: 14px 18px;
            border: none;
            border-radius: 16px;
            background: linear-gradient(135deg, #38bdf8, #0ea5e9);
            color: #0f172a;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 18px 30px rgba(56, 189, 248, 0.28);
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Store and Display People</h1>
        <p>Click the button to create a list of three people and display each person’s information in a styled card.</p>

        <button id="showBtn">Show 3 Persons</button>
        <div id="personList" class="person-list"></div>
    </div>

    <script>
        const showBtn = document.getElementById('showBtn');
        const personList = document.getElementById('personList');

        const people = [
            { name: 'Aisha', age: 24, city: 'Lagos' },
            { name: 'Ravi', age: 29, city: 'Mumbai' },
            { name: 'Mia', age: 21, city: 'Dubai' }
        ];

        showBtn.addEventListener('click', () => {
            personList.innerHTML = '';
            people.forEach(person => {
                const card = document.createElement('div');
                card.className = 'person-card';
                card.innerHTML = `
                    <strong>Name:</strong> ${person.name}<br />
                    <strong>Age:</strong> ${person.age}<br />
                    <strong>City:</strong> ${person.city}
                `;
                personList.appendChild(card);
            });
        });
    </script>
</body>
</html>
