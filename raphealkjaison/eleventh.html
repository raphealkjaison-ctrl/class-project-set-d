<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arithmetic Function Demo</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at top left, #111827 0%, #0f172a 35%, #0b1120 100%);
            color: #e2e8f0;
            font-family: 'Inter', system-ui, sans-serif;
        }

        .card {
            width: min(620px, calc(100% - 32px));
            padding: 38px 34px;
            border-radius: 28px;
            background: rgba(15, 23, 42, 0.96);
            border: 1px solid rgba(148, 163, 184, 0.18);
            box-shadow: 0 30px 70px rgba(15, 23, 42, 0.45);
            backdrop-filter: blur(16px);
        }

        h1 {
            margin: 0 0 12px;
            font-size: clamp(2rem, 3vw, 2.4rem);
            letter-spacing: -0.04em;
        }

        p {
            margin: 0 0 24px;
            color: #cbd5e1;
            line-height: 1.7;
        }

        .field {
            display: grid;
            gap: 12px;
            margin-bottom: 18px;
        }

        input,
        select {
            width: 100%;
            padding: 14px 16px;
            border-radius: 16px;
            border: 1px solid rgba(148, 163, 184, 0.24);
            background: rgba(30, 41, 59, 0.95);
            color: #f8fafc;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        input:focus,
        select:focus {
            border-color: rgba(96, 165, 250, 0.95);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.18);
        }

        button {
            width: 100%;
            padding: 14px 18px;
            border: none;
            border-radius: 16px;
            background: linear-gradient(135deg, #38bdf8, #0ea5e9);
            color: #0f172a;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 18px 30px rgba(56, 189, 248, 0.28);
        }

        #result {
            margin-top: 24px;
            padding: 20px 22px;
            border-radius: 18px;
            background: rgba(148, 163, 184, 0.1);
            border: 1px solid rgba(148, 163, 184, 0.18);
            min-height: 90px;
            color: #f8fafc;
            line-height: 1.7;
            font-size: 1rem;
        }

        strong {
            color: #7dd3fc;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Arithmetic Function Demo</h1>
        <p>Choose an operation and enter two numbers. The function will calculate the result based on your selection.</p>

        <div class="field">
            <input id="firstValue" type="number" placeholder="First number" />
            <input id="secondValue" type="number" placeholder="Second number" />
            <select id="operation">
                <option value="add">Add (+)</option>
                <option value="subtract">Subtract (-)</option>
                <option value="multiply">Multiply (×)</option>
                <option value="divide">Divide (÷)</option>
            </select>
        </div>

        <button id="calculateBtn">Calculate</button>
        <div id="result">Result will appear here after calculation.</div>
    </div>

    <script>
        const firstValue = document.getElementById('firstValue');
        const secondValue = document.getElementById('secondValue');
        const operation = document.getElementById('operation');
        const calculateBtn = document.getElementById('calculateBtn');
        const result = document.getElementById('result');

        function calculateResult() {
            const a = parseFloat(firstValue.value);
            const b = parseFloat(secondValue.value);
            const op = operation.value;

            if (Number.isNaN(a) || Number.isNaN(b)) {
                result.textContent = 'Please enter valid numbers for both fields.';
                return;
            }

            let output;
            switch (op) {
                case 'add':
                    output = a + b;
                    break;
                case 'subtract':
                    output = a - b;
                    break;
                case 'multiply':
                    output = a * b;
                    break;
                case 'divide':
                    if (b === 0) {
                        result.textContent = 'Cannot divide by zero.';
                        return;
                    }
                    output = a / b;
                    break;
                default:
                    output = 'Invalid operation.';
            }

            result.innerHTML = `
                <strong>Operation:</strong> ${op}<br />
                <strong>Result:</strong> ${output}
            `;
        }

        calculateBtn.addEventListener('click', calculateResult);
    </script>
</body>
</html>
