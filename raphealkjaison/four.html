<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toggle String Case</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at top left, #0f172a 0%, #1e293b 45%, #0b1120 100%);
            color: #e2e8f0;
            font-family: 'Inter', system-ui, sans-serif;
        }

        .panel {
            width: min(600px, calc(100% - 32px));
            padding: 36px 32px;
            border-radius: 28px;
            background: rgba(15, 23, 42, 0.95);
            border: 1px solid rgba(148, 163, 184, 0.16);
            box-shadow: 0 30px 70px rgba(15, 23, 42, 0.45);
            backdrop-filter: blur(18px);
        }

        h1 {
            margin: 0 0 12px;
            font-size: clamp(2rem, 3vw, 2.4rem);
            letter-spacing: -0.04em;
        }

        p {
            margin: 0 0 24px;
            color: #cbd5e1;
            line-height: 1.7;
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            color: #e2e8f0;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 16px;
            border: 1px solid rgba(148, 163, 184, 0.24);
            background: rgba(30, 41, 59, 0.95);
            color: #f8fafc;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        input:focus {
            border-color: rgba(96, 165, 250, 0.95);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.18);
        }

        .buttons {
            display: grid;
            gap: 14px;
            margin-top: 18px;
        }

        button {
            width: 100%;
            padding: 14px 18px;
            border: none;
            border-radius: 16px;
            background: linear-gradient(135deg, #38bdf8, #0ea5e9);
            color: #0f172a;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 18px 30px rgba(56, 189, 248, 0.28);
        }

        #result {
            margin-top: 24px;
            padding: 18px 22px;
            border-radius: 18px;
            background: rgba(148, 163, 184, 0.1);
            border: 1px solid rgba(148, 163, 184, 0.18);
            color: #f8fafc;
            min-height: 84px;
            line-height: 1.7;
            font-size: 1rem;
        }

        strong {
            color: #7dd3fc;
        }
    </style>
</head>
<body>
    <div class="panel">
        <h1>Toggle Case for a String</h1>
        <p>Type any text below, then choose whether to convert the entire string to upper case or lower case.</p>

        <label for="textInput">Enter text</label>
        <input id="textInput" type="text" placeholder="Type a string here" autocomplete="off" />

        <div class="buttons">
            <button id="upperBtn">Convert to UPPERCASE</button>
            <button id="lowerBtn">Convert to lowercase</button>
        </div>

        <div id="result">The converted text will appear here.</div>
    </div>

    <script>
        const textInput = document.getElementById('textInput');
        const upperBtn = document.getElementById('upperBtn');
        const lowerBtn = document.getElementById('lowerBtn');
        const result = document.getElementById('result');

        function updateResult(value) {
            if (!value.trim()) {
                result.textContent = 'Please enter text to convert.';
                return;
            }
            result.textContent = value;
        }

        upperBtn.addEventListener('click', () => {
            const value = textInput.value;
            updateResult(value.toUpperCase());
        });

        lowerBtn.addEventListener('click', () => {
            const value = textInput.value;
            updateResult(value.toLowerCase());
        });

        textInput.addEventListener('keydown', (event) => {
            if (event.key === 'Enter') {
                const value = textInput.value;
                updateResult(value.toUpperCase());
            }
        });
    </script>
</body>
</html>
