<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Age Validation</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 45%, #111827 100%);
            color: #e2e8f0;
            font-family: 'Inter', system-ui, sans-serif;
        }

        .card {
            width: min(600px, calc(100% - 32px));
            padding: 36px 32px;
            border-radius: 28px;
            background: rgba(15, 23, 42, 0.96);
            border: 1px solid rgba(148, 163, 184, 0.18);
            box-shadow: 0 30px 70px rgba(15, 23, 42, 0.45);
            backdrop-filter: blur(16px);
        }

        h1 {
            margin: 0 0 12px;
            font-size: clamp(2rem, 3vw, 2.4rem);
            letter-spacing: -0.04em;
        }

        p {
            margin: 0 0 24px;
            color: #cbd5e1;
            line-height: 1.7;
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            color: #e2e8f0;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 16px;
            border: 1px solid rgba(148, 163, 184, 0.24);
            background: rgba(30, 41, 59, 0.95);
            color: #f8fafc;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        input:focus {
            border-color: rgba(96, 165, 250, 0.95);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.18);
        }

        button {
            margin-top: 20px;
            width: 100%;
            padding: 14px 18px;
            border: none;
            border-radius: 16px;
            background: linear-gradient(135deg, #38bdf8, #0ea5e9);
            color: #0f172a;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 18px 30px rgba(56, 189, 248, 0.28);
        }

        #message {
            margin-top: 24px;
            padding: 18px 20px;
            border-radius: 18px;
            background: rgba(148, 163, 184, 0.1);
            border: 1px solid rgba(148, 163, 184, 0.18);
            min-height: 72px;
            color: #f8fafc;
            line-height: 1.7;
            font-size: 1rem;
        }

        .error {
            color: #fecaca;
        }

        .success {
            color: #a7f3d0;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Age Validation</h1>
        <p>Enter your age and submit. The validation will check if the age is 18 or older.</p>

        <label for="ageInput">Your age</label>
        <input id="ageInput" type="number" min="0" placeholder="Enter your age" />
        <button id="validateBtn">Validate Age</button>

        <div id="message">Waiting for input...</div>
    </div>

    <script>
        const ageInput = document.getElementById('ageInput');
        const validateBtn = document.getElementById('validateBtn');
        const message = document.getElementById('message');

        function validateAge() {
            const ageValue = Number(ageInput.value);

            if (ageInput.value.trim() === '') {
                message.textContent = 'Please enter your age.';
                message.className = 'error';
                return;
            }

            if (Number.isNaN(ageValue) || ageValue < 0) {
                message.textContent = 'Please enter a valid age.';
                message.className = 'error';
                return;
            }

            if (ageValue >= 18) {
                message.textContent = 'Access granted. Age is 18 or older.';
                message.className = 'success';
            } else {
                message.textContent = 'Access denied. Age must be 18 or older.';
                message.className = 'error';
            }
        }

        validateBtn.addEventListener('click', validateAge);
    </script>
</body>
</html>
