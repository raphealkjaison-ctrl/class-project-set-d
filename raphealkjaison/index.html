<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at top left, #5e72e4 0%, #2b67f6 35%, #102a60 100%);
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .card {
            width: min(520px, calc(100% - 32px));
            padding: 36px 32px;
            background: rgba(255, 255, 255, 0.11);
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 24px;
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.18);
            backdrop-filter: blur(20px);
        }

        h1 {
            margin: 0 0 14px;
            font-size: clamp(2rem, 3vw, 2.5rem);
        }

        label {
            display: block;
            margin-bottom: 10px;
            opacity: 0.9;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.25);
            background: rgba(255, 255, 255, 0.12);
            color: #ffffff;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        input:focus {
            border-color: rgba(255, 255, 255, 0.8);
            box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.12);
        }

        button {
            margin-top: 14px;
            width: 100%;
            padding: 14px 18px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, #ff8c00, #ff4d6d);
            color: #fff;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 18px 30px rgba(255, 77, 109, 0.24);
        }

        #result {
            margin-top: 24px;
            padding: 18px 20px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.14);
            min-height: 48px;
            display: flex;
            align-items: center;
            font-size: 1rem;
            letter-spacing: 0.01em;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Reverse a String</h1>
        <label for="textInput">Enter text</label>
        <input id="textInput" type="text" placeholder="Type a string here" autocomplete="off" />
        <button id="reverseButton">Reverse</button>
        <div id="result">Enter text and click Reverse.</div>
    </div>

    <script>
        const input = document.getElementById('textInput');
        const button = document.getElementById('reverseButton');
        const result = document.getElementById('result');

        function displayReversed() {
            const value = input.value;
            const reversed = value.split('').reverse().join('');
            result.textContent = reversed ? `Reversed: ${reversed}` : 'Enter text and click Reverse.';
        }

        button.addEventListener('click', displayReversed);

        input.addEventListener('keydown', (event) => {
            if (event.key === 'Enter') {
                displayReversed();
            }
        });
    </script>
</body>
</html>
