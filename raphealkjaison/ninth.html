<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find Index of Element</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at top left, #0f172a 0%, #1e293b 45%, #020617 100%);
            color: #e2e8f0;
            font-family: 'Inter', system-ui, sans-serif;
        }

        .panel {
            width: min(620px, calc(100% - 32px));
            padding: 36px 34px;
            border-radius: 28px;
            background: rgba(15, 23, 42, 0.96);
            border: 1px solid rgba(148, 163, 184, 0.18);
            box-shadow: 0 30px 70px rgba(15, 23, 42, 0.45);
            backdrop-filter: blur(16px);
        }

        h1 {
            margin: 0 0 12px;
            font-size: clamp(2rem, 3vw, 2.4rem);
            letter-spacing: -0.04em;
        }

        p {
            margin: 0 0 24px;
            color: #cbd5e1;
            line-height: 1.7;
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            color: #e2e8f0;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 16px;
            border: 1px solid rgba(148, 163, 184, 0.24);
            background: rgba(30, 41, 59, 0.95);
            color: #f8fafc;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        input:focus {
            border-color: rgba(96, 165, 250, 0.95);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.18);
        }

        button {
            margin-top: 18px;
            width: 100%;
            padding: 14px 18px;
            border: none;
            border-radius: 16px;
            background: linear-gradient(135deg, #38bdf8, #0ea5e9);
            color: #0f172a;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 18px 30px rgba(56, 189, 248, 0.28);
        }

        #result {
            margin-top: 24px;
            padding: 20px 22px;
            border-radius: 18px;
            background: rgba(148, 163, 184, 0.1);
            border: 1px solid rgba(148, 163, 184, 0.18);
            min-height: 90px;
            color: #f8fafc;
            line-height: 1.7;
            font-size: 1rem;
        }

        strong {
            color: #7dd3fc;
        }
    </style>
</head>
<body>
    <div class="panel">
        <h1>Find Index of Element</h1>
        <p>Enter an item name and click the button to find its index within the array.</p>

        <label for="searchInput">Search element</label>
        <input id="searchInput" type="text" placeholder="Enter item like Orange" autocomplete="off" />
        <button id="findBtn">Find Index</button>

        <div id="result">The index result will appear here.</div>
    </div>

    <script>
        const searchInput = document.getElementById('searchInput');
        const findBtn = document.getElementById('findBtn');
        const result = document.getElementById('result');

        const items = ['Apple', 'Banana', 'Orange', 'Mango', 'Grapes'];

        function findIndex() {
            const query = searchInput.value.trim();
            if (!query) {
                result.textContent = 'Please enter a value to search.';
                return;
            }

            const index = items.findIndex(item => item.toLowerCase() === query.toLowerCase());
            if (index === -1) {
                result.innerHTML = `<strong>${query}</strong> was not found in the array.`;
            } else {
                result.innerHTML = `
                    <strong>Array:</strong> ${items.join(', ')}<br />
                    <strong>Search:</strong> ${query}<br />
                    <strong>Index:</strong> ${index}
                `;
            }
        }

        findBtn.addEventListener('click', findIndex);
        searchInput.addEventListener('keydown', event => {
            if (event.key === 'Enter') {
                findIndex();
            }
        });
    </script>
</body>
</html>
