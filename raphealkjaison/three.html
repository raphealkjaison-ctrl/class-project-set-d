<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find Longest Word</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at top left, #1f2937 0%, #111827 45%, #0f172a 100%);
            color: #e2e8f0;
            font-family: 'Inter', system-ui, sans-serif;
        }

        .container {
            width: min(620px, calc(100% - 32px));
            padding: 36px 32px;
            border-radius: 28px;
            background: rgba(15, 23, 42, 0.92);
            box-shadow: 0 28px 60px rgba(15, 23, 42, 0.45);
            border: 1px solid rgba(148, 163, 184, 0.16);
            backdrop-filter: blur(16px);
        }

        h1 {
            margin: 0 0 12px;
            font-size: clamp(2rem, 3vw, 2.5rem);
            letter-spacing: -0.04em;
        }

        p {
            margin: 0 0 24px;
            color: #cbd5e1;
            line-height: 1.7;
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            color: #e2e8f0;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 16px;
            border: 1px solid rgba(148, 163, 184, 0.24);
            background: rgba(30, 41, 59, 0.95);
            color: #f8fafc;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        input:focus {
            border-color: rgba(96, 165, 250, 0.95);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.18);
        }

        button {
            margin-top: 18px;
            width: 100%;
            padding: 14px 18px;
            border: none;
            border-radius: 16px;
            background: linear-gradient(135deg, #3b82f6, #06b6d4);
            color: #0f172a;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 18px 30px rgba(56, 189, 248, 0.28);
        }

        #result {
            margin-top: 24px;
            padding: 18px 22px;
            border-radius: 18px;
            background: rgba(148, 163, 184, 0.1);
            border: 1px solid rgba(148, 163, 184, 0.18);
            color: #f8fafc;
            min-height: 70px;
            line-height: 1.7;
            font-size: 1rem;
        }

        strong {
            color: #7dd3fc;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Find the Longest Word</h1>
        <p>Enter a sentence, then click the button to display the longest word in the sentence.</p>

        <label for="sentenceInput">Your sentence</label>
        <input id="sentenceInput" type="text" placeholder="Type a sentence here" autocomplete="off" />
        <button id="findButton">Find Longest Word</button>

        <div id="result">The result will appear here after you click the button.</div>
    </div>

    <script>
        const sentenceInput = document.getElementById('sentenceInput');
        const findButton = document.getElementById('findButton');
        const result = document.getElementById('result');

        function findLongestWord() {
            const text = sentenceInput.value.trim();
            if (!text) {
                result.textContent = 'Please enter a sentence first.';
                return;
            }

            const words = text.split(/\s+/).filter(Boolean);
            if (words.length === 0) {
                result.textContent = 'Please enter a valid sentence with at least one word.';
                return;
            }

            let longest = words[0];
            for (const word of words) {
                if (word.length > longest.length) {
                    longest = word;
                }
            }

            result.innerHTML = `<strong>Longest word:</strong> ${longest} <br /><strong>Length:</strong> ${longest.length}`;
        }

        findButton.addEventListener('click', findLongestWord);
        sentenceInput.addEventListener('keydown', (event) => {
            if (event.key === 'Enter') {
                findLongestWord();
            }
        });
    </script>
</body>
</html>
