<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Double-Click Clear Output</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at top left, #0f172a 0%, #1e293b 45%, #020617 100%);
            color: #e2e8f0;
            font-family: 'Inter', system-ui, sans-serif;
        }

        .card {
            width: min(640px, calc(100% - 32px));
            padding: 36px 32px;
            border-radius: 28px;
            background: rgba(15, 23, 42, 0.96);
            border: 1px solid rgba(148, 163, 184, 0.18);
            box-shadow: 0 30px 70px rgba(15, 23, 42, 0.45);
            backdrop-filter: blur(16px);
            text-align: center;
        }

        h1 {
            margin: 0 0 12px;
            font-size: clamp(2rem, 3vw, 2.4rem);
            letter-spacing: -0.04em;
        }

        p {
            margin: 0 0 24px;
            color: #cbd5e1;
            line-height: 1.7;
        }

        button {
            padding: 14px 18px;
            border: none;
            border-radius: 16px;
            background: linear-gradient(135deg, #38bdf8, #0ea5e9);
            color: #0f172a;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 18px 30px rgba(56, 189, 248, 0.28);
        }

        .output {
            margin-top: 24px;
            padding: 20px 22px;
            border-radius: 18px;
            background: rgba(148, 163, 184, 0.1);
            border: 1px solid rgba(148, 163, 184, 0.18);
            min-height: 120px;
            color: #f8fafc;
            line-height: 1.7;
            font-size: 1rem;
            cursor: pointer;
            user-select: none;
        }

        .hint {
            margin-top: 10px;
            color: #94a3b8;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Double-Click Clear Output</h1>
        <p>Click the button to generate output, then double-click the output area to clear it.</p>

        <button id="generateBtn">Generate Output</button>
        <div id="output" class="output">Double-click this box to clear the content.</div>
        <div class="hint">Double-click inside the output area to reset it.</div>
    </div>

    <script>
        const generateBtn = document.getElementById('generateBtn');
        const output = document.getElementById('output');

        generateBtn.addEventListener('click', () => {
            output.textContent = 'Task output generated. Double-click to clear this area.';
        });

        output.addEventListener('dblclick', () => {
            output.textContent = 'Output cleared. Click the button again to generate new output.';
        });
    </script>
</body>
</html>
