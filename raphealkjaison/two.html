<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Extract String Characters</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at top left, #4f46e5 0%, #2563eb 40%, #0f172a 100%);
            color: #f8fafc;
            font-family: 'Inter', system-ui, sans-serif;
        }

        .card {
            width: min(560px, calc(100% - 32px));
            padding: 34px 32px;
            border-radius: 28px;
            background: rgba(15, 23, 42, 0.94);
            border: 1px solid rgba(148, 163, 184, 0.18);
            box-shadow: 0 28px 60px rgba(15, 23, 42, 0.35);
            backdrop-filter: blur(18px);
        }

        h1 {
            margin: 0 0 10px;
            font-size: clamp(2rem, 3vw, 2.4rem);
            letter-spacing: -0.04em;
        }

        p {
            margin: 0 0 24px;
            color: #cbd5e1;
            line-height: 1.6;
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            color: #e2e8f0;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 16px;
            border: 1px solid rgba(148, 163, 184, 0.22);
            background: rgba(15, 23, 42, 0.78);
            color: #f8fafc;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        input:focus {
            border-color: rgba(96, 165, 250, 0.9);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.18);
        }

        button {
            margin-top: 18px;
            width: 100%;
            padding: 14px 16px;
            border: none;
            border-radius: 16px;
            background: linear-gradient(135deg, #38bdf8, #0ea5e9);
            color: #0f172a;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 16px 30px rgba(14, 165, 233, 0.28);
        }

        #output {
            margin-top: 24px;
            padding: 18px 20px;
            border-radius: 18px;
            background: rgba(226, 232, 240, 0.1);
            border: 1px solid rgba(148, 163, 184, 0.18);
            min-height: 80px;
            color: #f8fafc;
            line-height: 1.75;
            font-size: 1rem;
        }

        strong {
            color: #bae6fd;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Extract String Characters</h1>
        <p>Enter a string and click the button to extract the first, third, fourth, and last characters.</p>

        <label for="inputString">Input string</label>
        <input id="inputString" type="text" placeholder="Type your string here" autocomplete="off" />
        <button id="extractBtn">Extract Characters</button>

        <div id="output">Enter text and click the button to see the extracted characters.</div>
    </div>

    <script>
        const input = document.getElementById('inputString');
        const button = document.getElementById('extractBtn');
        const output = document.getElementById('output');

        function showCharacters() {
            const value = input.value.trim();
            if (!value) {
                output.textContent = 'Please enter a string first.';
                return;
            }

            const first = value.charAt(0) || '';
            const third = value.charAt(2) || '';
            const fourth = value.charAt(3) || '';
            const last = value.charAt(value.length - 1) || '';

            output.innerHTML = `
                <strong>First character:</strong> ${first || '[none]'}<br />
                <strong>Third character:</strong> ${third || '[none]'}<br />
                <strong>Fourth character:</strong> ${fourth || '[none]'}<br />
                <strong>Last character:</strong> ${last || '[none]'}
            `;
        }

        button.addEventListener('click', showCharacters);
        input.addEventListener('keydown', (event) => {
            if (event.key === 'Enter') showCharacters();
        });
    </script>
</body>
</html>
